/* FIXED SLIDE VISIBILITY */
.slide {
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transform:scale(0.95);
  transition:all 0.4s ease;
}

.slide.active {
  opacity:1;
  pointer-events:auto;
  transform:scale(1);
  display:flex;
}
